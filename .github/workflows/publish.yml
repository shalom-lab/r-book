name: 自动部署书籍 (GitHub Pages & EdgeOne)

on:
  push:
    branches: [ main ]  # 只有 main 分支变动时才触发
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 必须开启，否则无法推送到 gh-pages 分支
    
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 设置 Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # 这里不需要 setup-r，因为我们利用 _freeze 结果
      - name: 渲染全书
        run: |
          quarto render

      # 关键步骤：发布到 gh-pages 分支
      # 这会自动创建/更新一个孤儿分支，里面只有 docs/ 里的内容
      - name: 发布到 gh-pages 分支
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}